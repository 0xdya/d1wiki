<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>d1wiki</title>
<meta name="author" content="0xdya">
<meta http-equiv="Content-Language" content="ar">
<meta name="description" content="موقع عربي اشارك فيه شروحاتي التقنية">
<meta name="keywords" content="d1wiki, d1, wiki, 0xdya">
<meta name="robots" content="index, follow">
<meta property="og:title" content="d1wiki">
<meta property="og:description" content="موقع عربي اشارك فيه شروحاتي التقنية">
<meta property="og:image" content="https://d1wiki.vercel.app/d1logo.png">
<meta property="og:url" content="https://d1wiki.vercel.app/">
<meta property="og:type" content="website">
<link rel="manifest" href="/site.webmanifest">
<link rel="icon" href="./d1logo.png" type="png">
<link rel="canonical" href="https://d1wiki.vercel.app/">
<link href="https://cdn.jsdelivr.net/npm/fork-corner/dist/fork-corner.min.css" rel="stylesheet" />
<style>
    *, *::before, *::after { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
    background: #fafafa;
    margin: 0;
    color: #333;
  }
  .container {
    width: 100vw;
    max-width: 800px !important;
    margin: 0 auto;
    padding: 40px 20px;
    background: #fff;
    min-height: 100vh;
    box-shadow: 0 0 10px rgba(0,0,0,.05);
  }
  .header {
    text-align: center;
    margin-bottom: 40px;
    padding-bottom: 20px;
    border-bottom: 1px solid #eaecef;
  }
  .header h1 {
    font-size: 2.2rem;
    font-weight: 800;
    margin-bottom: 10px;
    color: #000;
  }
  .header p { margin: 0; color: #555; font-size: 15px; }

  .articles { display: grid; gap: 20px; }

  .card {
    border: 1px solid #eaecef;
    border-radius: 12px;
    padding: 20px;
    transition: box-shadow 0.2s;
    position: relative;
  }
  .card:hover { box-shadow: 0 4px 12px rgba(0,0,0,.07); }

  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 10px;
    flex-wrap: wrap;
  }
  .card h2 { font-size: 1.25rem; margin: 0; color: #000; }

  .lang-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 12px;
    color: #555;
  }
  .lang-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: #ccc;
    flex-shrink: 0;
  }

  .card p {
    font-size: 15px;
    color: #555;
    margin-bottom: 16px;
    line-height: 1.6;
  }

  .gh-stats {
    display: flex;
    gap: 16px;
    font-size: 13px;
    color: #666;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .gh-stats span {
    display: inline-flex;
    align-items: center;
    gap: 4px;
  }
  .gh-stats svg { opacity: .65; }


  .card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 10px;
  }
  .card-footer .updated {
    font-size: 12px;
    color: #999;
  }
  .card-actions { display: flex; gap: 8px; }

  .btn {
    display: inline-block;
    padding: 7px 14px;
    text-decoration: none;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 500;
    transition: opacity 0.15s;
  }
  .btn:hover { opacity: .8; }
  .btn-primary { background: #000; color: #fff; }
  .btn-ghost {
    background: transparent;
    color: #333;
    border: 1px solid #d0d7de;
  }

  .gh-loading { font-size: 12px; color: #aaa; margin-bottom: 14px; }
  .gh-error   { font-size: 12px; color: #e85444; margin-bottom: 14px; }

  .footer {
    margin-top: 40px;
    padding-top: 20px;
    border-top: 1px solid #eaecef;
    text-align: center;
    font-size: 14px;
    color: #777;
  }
</style>
</head>
<body>

<a href="https://github.com/0xdya/d1wiki" target="_blank" id="fork-corner"
   class="fork-corner fc-size-small fc-pos-tr fc-animate-grow fc-theme-github"></a>

<div class="container">
  <div class="header">
    <h1>d1wiki</h1>
    <p>دليل موحد لكل المقالات والسكربتات التي أكتبها</p>
  </div>

  <div class="articles" id="projects-container">
  </div>

  <div class="footer">© 2025 - كل الحقوق محفوظة</div>
</div>

<script>const GITHUB_USER = '0xdya';

const projects = [
  { repo: 'artime',   articlePath: './artime/',   label: 'اقرأ المزيد' },
  { repo: 'HNT',      articlePath: './HNT/',       label: 'اقرأ المزيد' },
  { repo: 'fastpush', articlePath: './fastpush/',  label: 'اقرأ المزيد' },
];

const LANG_COLORS = {
  JavaScript: '#f1e05a',
  TypeScript: '#3178c6',
  Python:     '#3572A5',
  Rust:       '#dea584',
  Go:         '#00ADD8',
  Shell:      '#89e051',
  Bash:       '#89e051',
  CSS:        '#563d7c',
  HTML:       '#e34c26',
  C:          '#555555',
  'C++':      '#f34b7d',
  Lua:        '#000080',
  Ruby:       '#701516',
  default:    '#8b8b8b',
};

function langColor(lang) {
  return LANG_COLORS[lang] || LANG_COLORS.default;
}

function formatDate(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString('ar-DZ', { year: 'numeric', month: 'short', day: 'numeric' });
}


const ICONS = {
  star: `<svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor">
    <path d="M8 .25a.75.75 0 0 1 .673.418l1.882 3.815 4.21.612a.75.75 0 0 1 .416 1.279l-3.046 2.97.719 4.192a.751.751 0 0 1-1.088.791L8 12.347l-3.766 1.98a.75.75 0 0 1-1.088-.79l.72-4.194L.818 6.374a.75.75 0 0 1 .416-1.28l4.21-.611L7.327.668A.75.75 0 0 1 8 .25Z"/>
  </svg>`,
  fork: `<svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor">
    <path d="M5 5.372v.878c0 .414.336.75.75.75h4.5a.75.75 0 0 0 .75-.75v-.878a2.25 2.25 0 1 1 1.5 0v.878a2.25 2.25 0 0 1-2.25 2.25h-1.5v2.128a2.251 2.251 0 1 1-1.5 0V8.5h-1.5A2.25 2.25 0 0 1 3.5 6.25v-.878a2.25 2.25 0 1 1 1.5 0ZM5 3.25a.75.75 0 1 0-1.5 0 .75.75 0 0 0 1.5 0Zm6.75.75a.75.75 0 1 0 0-1.5.75.75 0 0 0 0 1.5Zm-3 8.75a.75.75 0 1 0-1.5 0 .75.75 0 0 0 1.5 0Z"/>
  </svg>`,
  eye: `<svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor">
    <path d="M8 2c1.981 0 3.671.992 4.933 2.078 1.27 1.091 2.187 2.345 2.637 3.023a1.62 1.62 0 0 1 0 1.798c-.45.678-1.367 1.932-2.637 3.023C11.67 13.008 9.981 14 8 14c-1.981 0-3.671-.992-4.933-2.078C1.797 10.83.88 9.576.43 8.898a1.62 1.62 0 0 1 0-1.798c.45-.677 1.367-1.931 2.637-3.022C4.33 2.992 6.019 2 8 2ZM1.679 7.932a.12.12 0 0 0 0 .136c.411.622 1.241 1.75 2.366 2.717C5.176 11.758 6.527 12.5 8 12.5c1.473 0 2.825-.742 3.955-1.715 1.124-.967 1.954-2.096 2.366-2.717a.12.12 0 0 0 0-.136c-.412-.621-1.242-1.75-2.366-2.717C10.824 4.242 9.473 3.5 8 3.5c-1.473 0-2.825.742-3.955 1.715-1.124.967-1.954 2.096-2.366 2.717ZM8 10a2 2 0 1 1-.001-3.999A2 2 0 0 1 8 10Z"/>
  </svg>`,
};

function createCardShell(project) {
  const div = document.createElement('div');
  div.className = 'card';
  div.id = `card-${project.repo}`;
  div.innerHTML = `
    <div class="card-header">
      <h2>${project.repo}</h2>
    </div>
    <div class="gh-loading" id="gh-status-${project.repo}">جارٍ تحميل بيانات GitHub…</div>
    <p id="desc-${project.repo}"></p>
    <div class="gh-stats" id="stats-${project.repo}" style="display:none"></div>
    <div class="card-footer">
      <span class="updated" id="updated-${project.repo}"></span>
      <div class="card-actions">
        <a class="btn btn-ghost" href="https://github.com/${GITHUB_USER}/${project.repo}" target="_blank">GitHub</a>
        <a class="btn btn-primary" href="${project.articlePath}">${project.label}</a>
      </div>
    </div>
  `;
  return div;
}

function populateCard(project, data) {
  const status   = document.getElementById(`gh-status-${project.repo}`);
  const desc     = document.getElementById(`desc-${project.repo}`);
  const stats    = document.getElementById(`stats-${project.repo}`);
  const updated  = document.getElementById(`updated-${project.repo}`);
  const header   = document.querySelector(`#card-${project.repo} .card-header`);

  desc.textContent = data.description || '';

  if (data.language) {
    const badge = document.createElement('span');
    badge.className = 'lang-badge';
    badge.innerHTML = `<span class="lang-dot" style="background:${langColor(data.language)}"></span>${data.language}`;
    header.appendChild(badge);
  }

  stats.innerHTML = `
    <span>${ICONS.star} ${data.stargazers_count.toLocaleString('ar')}</span>
    <span>${ICONS.fork} ${data.forks_count.toLocaleString('ar')}</span>
    <span>${ICONS.eye} ${data.watchers_count.toLocaleString('ar')}</span>
    ${data.open_issues_count ? `<span>🐛 ${data.open_issues_count}</span>` : ''}
    ${data.license ? `<span>📄 ${data.license.spdx_id}</span>` : ''}
  `;
  stats.style.display = 'flex';

  updated.textContent = `آخر تحديث: ${formatDate(data.pushed_at)}`;

  status.remove();
}

async function fetchRepo(project) {
  const url = `https://api.github.com/repos/${GITHUB_USER}/${project.repo}`;
  const res = await fetch(url, {
    headers: { 'Accept': 'application/vnd.github+json' }
  });
  if (!res.ok) throw new Error(`${res.status}`);
  return res.json();
}

async function init() {
  const container = document.getElementById('projects-container');

  for (const project of projects) {
    const card = createCardShell(project);
    container.appendChild(card);

    fetchRepo(project)
      .then(data => populateCard(project, data))
      .catch(err => {
        const status = document.getElementById(`gh-status-${project.repo}`);
        if (status) {
          status.className = 'gh-error';
          status.textContent = `تعذّر تحميل بيانات GitHub (${err.message})`;
        }
      });
  }
}

init();
</script>

<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js');
  }
</script>
<script src="https://cdn.jsdelivr.net/npm/fork-corner/dist/fork-corner.min.js" defer></script>
</body>
</html>
