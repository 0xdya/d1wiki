<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>d1wiki</title>
<meta name="author" content="0xdya">
<meta http-equiv="Content-Language" content="ar">
<meta name="description" content="موقع عربي اشارك فيه شروحاتي التقنية">
<meta name="keywords" content="d1wiki, d1, wiki, 0xdya">
<meta name="robots" content="index, follow">
<meta property="og:title" content="d1wiki">
<meta property="og:description" content="موقع عربي اشارك فيه شروحاتي التقنية">
<meta property="og:image" content="https://d1wiki.vercel.app/d1logo.png">
<meta property="og:url" content="https://d1wiki.vercel.app/">
<meta property="og:type" content="website">
<link rel="manifest" href="/site.webmanifest">
<link rel="icon" href="./d1logo.png" type="png">
<link rel="canonical" href="https://d1wiki.vercel.app/">
<link href="https://cdn.jsdelivr.net/npm/fork-corner/dist/fork-corner.min.css" rel="stylesheet" />
<style>
  :root {
      --bg: #080808;
      --surface: #0a0a0a;
      --surface-secondary: #21262d;
      --border: #ffffff14;
      --border-hover: #88888888;
      --text-main: #c9d1d9;
      --text-muted: #8b949e;
      --accent: #f0f6fc;
      --link: #58a6ff;
      --purple: #a855f7;
      --font-sans: 'Inter', system-ui, -apple-system, sans-serif;
      --radius: 8px;
      --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
  }
  
  *, *::before, *::after { box-sizing: border-box; }
  
  body {
      font-family: var(--font-sans);
      background-color: var(--bg);
      margin: 0;
      color: var(--text-main);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
  }
  
  .container {
      width: 100%;
      max-width: 840px;
      margin: 0 auto;
      padding: 60px 22px;
      min-height: 100vh;
  }
  
  .header {
      text-align: center;
      margin-bottom: 60px;
      position: relative;
  }
  
  .header h1 {
      font-size: 3rem;
      font-weight: 900;
      margin-bottom: 10px;
      color: var(--accent);
      letter-spacing: -1px;
  }
  
  .header p {
      margin: 0;
      color: var(--text-muted);
      font-size: 1.1rem;
  }
  
  .header::after {
      content: "";
      display: block;
      width: 60px;
      height: 4px;
      background: var(--purple);
      margin: 30px auto 0;
      border-radius: 2px;
  }
  
  .articles { display: grid; gap: 24px; }
  
  .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      transition: transform var(--transition), border-color var(--transition);
  }
  
  .card:hover {
      /* transform: translateY(-2px); */
      border-color: var(--border-hover);
  }
  
  .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
      flex-wrap: wrap;
  }
  
  .card h2 { 
      font-size: 1.5rem; 
      margin: 0; 
      color: var(--accent);
      font-weight: 800;
  }
  
  .lang-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: var(--text-muted);
  }
  
  .lang-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
  }
  
  .card p {
      font-size: 1rem;
      color: var(--text-main);
      margin-bottom: 20px;
      opacity: 0.9;
  }
  
  .gh-stats {
      display: flex;
      gap: 20px;
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 20px;
  }
  
  .gh-stats span {
      display: inline-flex;
      align-items: center;
      gap: 5px;
  }
  
  .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 15px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
  }
  
  .card-footer .updated {
      font-size: 13px;
      color: var(--text-muted);
  }
  
  .card-actions { display: flex; gap: 12px; }
  
  .btn {
      display: inline-flex;
      align-items: center;
      padding: 8px 18px;
      text-decoration: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      transition: all var(--transition);
  }
  
  .btn-primary { 
      background: var(--accent); 
      color: var(--bg) !important; 
  }
  
  .btn-ghost {
      background: var(--surface-secondary);
      color: var(--accent);
      border: 1px solid var(--border);
  }
  
  .btn:hover { opacity: 0.9; transform: scale(1.1); }
  
  .contributors {
      margin: 20px 0;
      padding: 12px;
      background: rgba(168, 85, 247, 0.05);
      /* border-radius: 8px; */
      border-right: 3px solid var(--purple);
  }
  
  .contributors-title {
      font-size: 0.85rem;
      color: var(--purple);
      margin-bottom: 10px;
      font-weight: 700;
  }
  
  .contributors-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
  }
  
  .contributor-item {
      display: flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      color: var(--text-main);
      font-size: 12px;
      padding: 4px 4px 4px 6px;
      border-radius: 200px;
      border: 1px solid var(--border);
      background: var(--surface);
      transition: border-color var(--transition);
  }
  
  .contributor-item:hover {
      border-color: var(--purple);
  }
  
  .contributor-avatar {
      width: 22px;
      height: 22px;
      border-radius: 50%;
  }
  
  .footer {
      margin-top: 80px;
      padding: 40px 0;
      border-top: 1px solid var(--border);
      text-align: center;
      font-size: 0.95rem;
      color: var(--text-muted);
  }
  
  .footer a { color: var(--link); text-decoration: none; }
  
  .gh-loading { color: var(--purple); font-size: 13px; }
  </style>
</head>
<body>

<a href="https://github.com/0xdya/d1wiki" target="_blank" id="fork-corner"
   class="fork-corner fc-size-small fc-pos-tr fc-animate-grow fc-theme-github"></a>

<div class="container">
  <div class="header">
    <h1>d1wiki</h1>
    <p>دليل موحد لكل المقالات والسكربتات التي أكتبها</p>
  </div>

  <div class="articles" id="projects-container">
  </div>

  <div class="footer">developed by <a href="https://0xdya.vercel.app/" >@0xdya</a></div>
</div>

<script>const GITHUB_USER = '0xdya';

const projects = [
  { repo: 'timeAr',   articlePath: './time-ar/',   label: 'اقرأ المزيد', showContributors: true },
  { repo: 'HNT',      articlePath: './HNT/',       label: 'اقرأ المزيد' },
  { repo: 'fastpush', articlePath: './fastpush/',  label: 'اقرأ المزيد' },
];

const LANG_COLORS = {
  JavaScript: '#f1e05a',
  TypeScript: '#3178c6',
  Python:     '#3572A5',
  Rust:       '#dea584',
  Go:         '#00ADD8',
  Shell:      '#89e051',
  Bash:       '#89e051',
  CSS:        '#563d7c',
  HTML:       '#e34c26',
  C:          '#555555',
  // 'C++':      '#f34b7d',
  Lua:        '#000080',
  Ruby:       '#701516',
  default:    '#8b8b8b',
};

function langColor(lang) {
  return LANG_COLORS[lang] || LANG_COLORS.default;
}

function formatDate(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString('ar-DZ', { year: 'numeric', month: 'short', day: 'numeric' });
}


const ICONS = {
  star: `<svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor">
    <path d="M8 .25a.75.75 0 0 1 .673.418l1.882 3.815 4.21.612a.75.75 0 0 1 .416 1.279l-3.046 2.97.719 4.192a.751.751 0 0 1-1.088.791L8 12.347l-3.766 1.98a.75.75 0 0 1-1.088-.79l.72-4.194L.818 6.374a.75.75 0 0 1 .416-1.28l4.21-.611L7.327.668A.75.75 0 0 1 8 .25Z"/>
  </svg>`,
  fork: `<svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor">
    <path d="M5 5.372v.878c0 .414.336.75.75.75h4.5a.75.75 0 0 0 .75-.75v-.878a2.25 2.25 0 1 1 1.5 0v.878a2.25 2.25 0 0 1-2.25 2.25h-1.5v2.128a2.251 2.251 0 1 1-1.5 0V8.5h-1.5A2.25 2.25 0 0 1 3.5 6.25v-.878a2.25 2.25 0 1 1 1.5 0ZM5 3.25a.75.75 0 1 0-1.5 0 .75.75 0 0 0 1.5 0Zm6.75.75a.75.75 0 1 0 0-1.5.75.75 0 0 0 0 1.5Zm-3 8.75a.75.75 0 1 0-1.5 0 .75.75 0 0 0 1.5 0Z"/>
  </svg>`,
  eye: `<svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor">
    <path d="M8 2c1.981 0 3.671.992 4.933 2.078 1.27 1.091 2.187 2.345 2.637 3.023a1.62 1.62 0 0 1 0 1.798c-.45.678-1.367 1.932-2.637 3.023C11.67 13.008 9.981 14 8 14c-1.981 0-3.671-.992-4.933-2.078C1.797 10.83.88 9.576.43 8.898a1.62 1.62 0 0 1 0-1.798c.45-.677 1.367-1.931 2.637-3.022C4.33 2.992 6.019 2 8 2ZM1.679 7.932a.12.12 0 0 0 0 .136c.411.622 1.241 1.75 2.366 2.717C5.176 11.758 6.527 12.5 8 12.5c1.473 0 2.825-.742 3.955-1.715 1.124-.967 1.954-2.096 2.366-2.717a.12.12 0 0 0 0-.136c-.412-.621-1.242-1.75-2.366-2.717C10.824 4.242 9.473 3.5 8 3.5c-1.473 0-2.825.742-3.955 1.715-1.124.967-1.954 2.096-2.366 2.717ZM8 10a2 2 0 1 1-.001-3.999A2 2 0 0 1 8 10Z"/>
  </svg>`,
};

function createCardShell(project) {
  const div = document.createElement('div');
  div.className = 'card';
  div.id = `card-${project.repo}`;
  div.innerHTML = `
    <div class="card-header">
      <h2>${project.repo}</h2>
    </div>
    <div class="gh-loading" id="gh-status-${project.repo}">جارٍ تحميل بيانات GitHub…</div>
    <p id="desc-${project.repo}"></p>
    <div class="gh-stats" id="stats-${project.repo}" style="display:none"></div>
    
    ${project.showContributors ? `<div class="contributors" id="contributors-${project.repo}"></div>` : ''}

    <div class="card-footer">
      <span class="updated" id="updated-${project.repo}"></span>
      <div class="card-actions">
        <a class="btn btn-ghost" href="https://github.com/${GITHUB_USER}/${project.repo}" target="_blank">GitHub</a>
        <a class="btn btn-primary" href="${project.articlePath}">${project.label}</a>
      </div>
    </div>
  `;
  return div;
}
async function fetchContributors(repo) {
  const url = `https://api.github.com/repos/${GITHUB_USER}/${repo}/contributors`;
  const res = await fetch(url);
  if (!res.ok) return [];
  return res.json();
}

function displayContributors(repo, contributors) {
  const container = document.getElementById(`contributors-${repo}`);
  if (!container) return;

  const title = document.createElement('div');
  title.className = 'contributors-title';
  title.textContent = 'المساهمون:';
  container.appendChild(title);

  const list = document.createElement('div');
  list.className = 'contributors-list';

  contributors.forEach(user => {
    const userLink = document.createElement('a');
    userLink.href = user.html_url;
    userLink.target = '_blank';
    userLink.className = 'contributor-item';
    
    userLink.innerHTML = `
      <img src="${user.avatar_url}" alt="${user.login}" class="contributor-avatar">
      <span class="contributor-name">${user.login}</span>
    `;
    
    list.appendChild(userLink);
  });
  
  container.appendChild(list);
}

function populateCard(project, data) {
  const status   = document.getElementById(`gh-status-${project.repo}`);
  const desc     = document.getElementById(`desc-${project.repo}`);
  const stats    = document.getElementById(`stats-${project.repo}`);
  const updated  = document.getElementById(`updated-${project.repo}`);
  const header   = document.querySelector(`#card-${project.repo} .card-header`);

  desc.textContent = data.description || '';

  if (data.language) {
    const badge = document.createElement('span');
    badge.className = 'lang-badge';
    badge.innerHTML = `<span class="lang-dot" style="background:${langColor(data.language)}"></span>${data.language}`;
    header.appendChild(badge);
  }

  stats.innerHTML = `
    <span>${ICONS.star} ${data.stargazers_count.toLocaleString('ar')}</span>
    <span>${ICONS.fork} ${data.forks_count.toLocaleString('ar')}</span>
    <!-- <span>${ICONS.eye} ${data.subscribers_count.toLocaleString('ar')}</span> -->
    ${data.open_issues_count ? `<span>🐛 ${data.open_issues_count}</span>` : ''}
    ${data.license ? `<span>📄 ${data.license.spdx_id}</span>` : ''}
  `;
  stats.style.display = 'flex';

  updated.textContent = `آخر تحديث: ${formatDate(data.pushed_at)}`;

  status.remove();
}

async function fetchRepo(project) {
  const url = `https://api.github.com/repos/${GITHUB_USER}/${project.repo}`;
  const res = await fetch(url, {
    headers: { 'Accept': 'application/vnd.github+json' }
  });
  if (!res.ok) throw new Error(`${res.status}`);
  return res.json();
}

async function init() {
  const container = document.getElementById('projects-container');

  for (const project of projects) {
    const card = createCardShell(project);
    container.appendChild(card);

    fetchRepo(project)
      .then(data => {
        populateCard(project, data);
        if (project.showContributors) {
          fetchContributors(project.repo).then(users => displayContributors(project.repo, users));
        }
      })
      .catch(err => {
        const status = document.getElementById(`gh-status-${project.repo}`);
        if (status) {
          status.className = 'gh-error';
          status.textContent = `تعذّر تحميل بيانات GitHub (${err.message})`;
        }
      });
  }
}
init();
</script>

<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js');
  }
</script>
<script src="https://cdn.jsdelivr.net/npm/fork-corner/dist/fork-corner.min.js" defer></script>
</body>
</html>
