<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vercel Styled Footer</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
      :root {
    --bg-color: #ffffff;
    --text-color: #666666;
    --heading-color: #000000;
    --border-color: #eaeaea;
    --hover-color: #000000;
    --accent-color: #0070f3; /* Vercel Blue */
}

.dark-theme {
    --bg-color: #000000;
    --text-color: #888888;
    --heading-color: #ffffff;
    --border-color: #333333;
    --hover-color: #ffffff;
}

* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
}

body {
    background-color: var(--bg-color);
    transition: background 0.3s ease;
}

.site-footer {
    width: 100%;
    border-top: 1px solid var(--border-color);
    padding: 60px 0 30px 0;
    background-color: var(--bg-color);
}

.footer-container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 24px;
}

.footer-grid {
    display: grid;
    grid-template-columns: 2fr 1fr 1fr 0.5fr;
    gap: 40px;
    margin-bottom: 50px;
}

.logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: 800;
    font-size: 1.2rem;
    color: var(--heading-color);
    margin-bottom: 15px;
    letter-spacing: -1px;
}

.description {
    font-size: 0.9rem;
    color: var(--text-color);
    line-height: 1.6;
}

h4 {
    color: var(--heading-color);
    font-size: 0.9rem;
    font-weight: 600;
    margin-bottom: 20px;
}

ul {
    list-style: none;
}

ul li {
    margin-bottom: 12px;
}

ul li a {
    text-decoration: none;
    color: var(--text-color);
    font-size: 0.85rem;
    transition: color 0.2s;
}

ul li a:hover {
    color: var(--hover-color);
}

.star-link:hover {
    color: #f5a623 !important;
}

/* زر الثيم */
.theme-btn {
    background: transparent;
    border: 1px solid var(--border-color);
    color: var(--text-color);
    padding: 8px 12px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s;
}

.theme-btn:hover {
    border-color: var(--hover-color);
    color: var(--hover-color);
}

/* الجزء السفلي */
.footer-bottom {
    border-top: 1px solid var(--border-color);
    padding-top: 30px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.made-by {
    font-size: 0.8rem;
    color: var(--text-color);
}

.made-by span {
    color: var(--heading-color);
    font-weight: 600;
}

.heart-icon {
    color: #ff4d4d;
    font-size: 10px;
}

.system-status {
    display: flex;
    align-items: center;
    gap: 8px;
}

.status-dot {
    width: 8px;
    height: 8px;
    background-color: #00ff00;
    border-radius: 50%;
    box-shadow: 0 0 8px #00ff00;
}

.status-text {
    font-size: 0.7rem;
    color: var(--text-color);
    text-transform: uppercase;
    letter-spacing: 1px;
}

/* Responsive */
@media (max-width: 768px) {
    .footer-grid {
        grid-template-columns: 1fr 1fr;
    }
    .brand {
        grid-column: span 2;
    }
    .footer-bottom {
        flex-direction: column;
        gap: 20px;
        text-align: center;
    }
}
    </style>
</head>
<body>

    <footer class="site-footer">
        <div class="footer-container">
            
            <div class="footer-grid">
                <div class="footer-section brand">
                    <div class="logo">
                        <svg width="24" height="24" viewBox="0 0 76 65" fill="none" xmlns="http://www.w3.org/2000/svg" class="logo-icon">
                            <path d="M37.5274 0L75.0548 65H0L37.5274 0Z" fill="currentColor"/>
                        </svg>
                        <span>VERCEL_OS</span>
                    </div>
                    <p class="description">منصة المطورين لبناء تجارب ويب مذهلة بسرعة البرق.</p>
                </div>

                <div class="footer-section">
                    <h4>المجتمع</h4>
                    <ul>
                        <li><a href="#">ديسكورد</a></li>
                        <li><a href="#">تويتر (X)</a></li>
                        <li><a href="#">المدونة</a></li>
                    </ul>
                </div>

                <div class="footer-section">
                    <h4>المشروع</h4>
                    <ul>
                        <li><a href="#"><i class="fab fa-github"></i> الكود المصدري</a></li>
                        <li><a href="#" class="star-link"><i class="fas fa-star"></i> أعطِ نجمة</a></li>
                    </ul>
                </div>

                <div class="footer-section theme-toggle-container">
                    <button id="theme-toggle" class="theme-btn" aria-label="تغيير الثيم">
                        <i class="fas fa-moon"></i>
                    </button>
                </div>
            </div>

            <div class="footer-bottom">
                <div class="made-by">
                    صُنع بكل <i class="fas fa-heart heart-icon"></i> من طرف <span>ضياء</span>
                </div>
                <div class="system-status">
                    <span class="status-dot"></span>
                    <span class="status-text">جميع الأنظمة تعمل بشكل مثالي</span>
                </div>
            </div>
        </div>
    </footer>

    <script>
        const themeBtn = document.getElementById('theme-toggle');
        const icon = themeBtn.querySelector('i');

        themeBtn.addEventListener('click', () => {
            document.body.classList.toggle('dark-theme');
            if (document.body.classList.contains('dark-theme')) {
                icon.classList.replace('fa-moon', 'fa-sun');
            } else {
                icon.classList.replace('fa-sun', 'fa-moon');
            }
        });
    </script>
</body>
</html>
